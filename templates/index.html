
<!DOCTYPE html>
<html>
<head>
    <title>Liver Cirrhosis Prediction</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;
            padding: 30px;
        }
        .container {
            background: #fff;
            padding: 25px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            border-radius: 10px;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }
        input[type="text"], input[type="submit"] {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        input[type="submit"] {
            background-color: #4CAF50;
            color: white;
            margin-top: 20px;
            cursor: pointer;
        }
        .result {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            text-align: center;
        }
        .logout {
            text-align: center;
            margin-top: 15px;
        }
        .logout a {
            color: #d9534f;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Liver Cirrhosis Prediction</h1>
        <form method="POST">
            <label>Age:</label>
            <input type="text" name="age" required>

            <label>Total Bilirubin:</label>
            <input type="text" name="tb" required>

            <label>A/G Ratio:</label>
            <input type="text" name="ag" required>

            <input type="submit" value="Predict">
        </form>

        {% if result %}
            <div class="result">
                Prediction: {{ result }}
            </div>
        {% endif %}

        <div class="logout">
            <a href="/logout">Logout</a>
        </div>
    </div>
</body>
</html>
